<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>문장 성분 레이싱 게임</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
</head>
<body>

    <!-- 시작 화면 -->
    <div id="start-screen" class="screen active">
        <div class="title-container">
            <h1>단어 레이싱 대결!</h1>
            <p>'어찌하다', '어떠하다', '무엇이다'를 구별해보세요!</p>
        </div>
        
        <div class="player-selection">
            <div class="mode-selection" style="margin-bottom: 2rem;">
                <h2 style="font-size: 2rem;">문제 세트 선택</h2>
                <div class="mode-buttons" style="display: flex; justify-content: center; gap: 1rem; margin-top: 1rem;">
                    <button id="btn-mode-same" class="btn-mode" data-mode="same" style="background: var(--accent); color: #fff;">같은 문제</button>
                    <button id="btn-mode-diff" class="btn-mode" data-mode="diff" style="background: var(--surface);">다른 문제</button>
                </div>
            </div>
            
            <h2>참가 인원을 선택하면 시작합니다!</h2>
            <div class="player-buttons">
                <button class="btn-select" data-players="1">1명</button>
                <button class="btn-select" data-players="2">2명</button>
                <button class="btn-select" data-players="3">3명</button>
                <button class="btn-select" data-players="4">4명</button>
                <button class="btn-select" data-players="5">5명</button>
                <button class="btn-select" data-players="6">6명</button>
            </div>
        </div>
    </div>

    <!-- 게임 화면 -->
    <div id="game-screen" class="screen" style="position:relative;">
        <button id="btn-back" class="btn-primary" style="position:absolute; top:10px; right:20px; font-size:1.2rem; padding:10px 20px; z-index:100; cursor:pointer;">첫 화면으로</button>
        <!-- 하단: 플레이어 트랙 및 조작 영역 -->
        <div id="players-container" class="players-container" style="height: 100%; padding: 20px; margin-top: 40px;">
            <!-- JS로 동적 생성됨 -->
        </div>
    </div>

    <!-- 결과 화면 -->
    <div id="result-screen" class="screen">
        <div class="result-container">
            <h1>게임 끝!</h1>
            <h2 id="winner-text">우승: 1P</h2>
            <button id="btn-restart" class="btn-primary">처음으로 돌아가기</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
